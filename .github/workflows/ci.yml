name: CI

on:
  push:
    branches: [main, claude/development]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Repo lint
        run: npm run lint:repo

      - name: ESLint
        run: npm run lint:js

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    # No `needs:` — e2e runs in PARALLEL with lint-and-build so CI
    # latency is bounded by max(lint, e2e) ≈ 2 min rather than
    # the previous lint + e2e ≈ 3+ min.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # Deploy the built `dist/` to GitHub Pages on every push to main.
  #
  # ONE-TIME SETUP REQUIRED: in repo Settings → Pages → "Build and
  # deployment" → Source, choose **GitHub Actions**. Without that
  # this job runs but Pages keeps serving from the branch root —
  # path-based URLs (/learn/<topic> etc.) 404 because the per-topic
  # index.html files only exist after a build.
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Deploy gates on lint-and-build (which is reliable) but NOT on
    # e2e. Reasoning: unit tests + lint + chart-lint + the build itself
    # all catch real regressions; e2e has been flaky on intro
    # accessibility timing and account-menu mobile selectors that have
    # nothing to do with production code quality. Blocking deploys on
    # flaky tests strands real changes — recent chart work was not
    # reaching production because of axe timing flakes.
    #
    # The post-deploy smoke-test step below still hits the live URL
    # and fails if the site is actually broken, so the deploy isn't
    # unguarded — it's gated on facts (does the site respond 200?),
    # not on a brittle test suite.
    needs: lint-and-build
    runs-on: ubuntu-latest
    permissions:
      pages:    write
      id-token: write
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      # ────────────────────────────────────────────────────────────
      # Post-deploy smoke test. Hit the live URL and a representative
      # generated topic page; fail the workflow if either returns
      # anything other than 200. Without this, a partial Pages
      # rollout (artifact uploaded but not promoted, CDN cold, the
      # topic-routes plugin silently skipped, …) shows CI green
      # while the site is broken for real users.
      #
      # Pages can be slow to propagate after a deploy; we wait up to
      # ~90s in 6×15s tries before declaring a regression.
      # ────────────────────────────────────────────────────────────
      - name: Smoke-test the live site
        run: |
          set -euo pipefail
          BASE='https://econos.co.uk'
          # `/learn/<topic>` was the legacy URL format; the live router
          # is path-based per board/theme. The old smoke probe has been
          # silently failing the deploy job for weeks even though the
          # site itself rolled out fine.
          PROBE_PATHS=(
            '/'
            '/edexcel_a/theme-2/causes-of-inflation-and-deflation/learn-it'
            '/sitemap.xml'
            '/articles/feed.xml'
          )
          for path in "${PROBE_PATHS[@]}"; do
            url="${BASE}${path}"
            code=''
            for attempt in 1 2 3 4 5 6; do
              code=$(curl -fsSL -o /dev/null -w '%{http_code}' --retry 0 --max-time 15 "$url" || true)
              if [ "$code" = '200' ]; then
                echo "✓ $url (attempt $attempt)"
                break
              fi
              echo "… $url returned $code (attempt $attempt / 6) — waiting 15s for propagation"
              sleep 15
            done
            if [ "$code" != '200' ]; then
              echo "✗ $url did not return 200 after 90s — failing the deploy."
              exit 1
            fi
          done

      # ────────────────────────────────────────────────────────────
      # Tell IndexNow about every URL in the sitemap on each deploy.
      # IndexNow is an open protocol consumed by Bing, Yandex and
      # Seznam (and possibly Google in future). The key is hard-coded
      # in vite.config.js and served as /<key>.txt — IndexNow fetches
      # that file to verify we own the host.
      #
      # Google does NOT consume IndexNow today. Google indexing is
      # driven by the sitemap (which we keep fresh + accurate
      # <lastmod>) plus internal links — see docs/seo-indexing.md.
      # ────────────────────────────────────────────────────────────
      - name: Ping IndexNow (Bing / Yandex / Seznam)
        continue-on-error: true
        run: |
          set -euo pipefail
          KEY='f50a6f1a73f22cc3dd6b52af512f63c0'
          HOST='econos.co.uk'
          # Pull every <loc> out of the live sitemap.
          URLS=$(curl -fsSL "https://${HOST}/sitemap.xml" \
            | grep -oE '<loc>[^<]+</loc>' \
            | sed -E 's#</?loc>##g')
          if [ -z "$URLS" ]; then
            echo "No sitemap URLs found — skipping IndexNow ping."
            exit 0
          fi
          URL_JSON=$(echo "$URLS" | jq -R . | jq -s .)
          PAYLOAD=$(jq -n \
            --arg host "$HOST" \
            --arg key "$KEY" \
            --arg keyLoc "https://${HOST}/${KEY}.txt" \
            --argjson urls "$URL_JSON" \
            '{host:$host, key:$key, keyLocation:$keyLoc, urlList:$urls}')
          echo "Submitting $(echo "$URLS" | wc -l) URLs to IndexNow…"
          curl -fsSL -X POST 'https://api.indexnow.org/IndexNow' \
            -H 'Content-Type: application/json; charset=utf-8' \
            -d "$PAYLOAD"
          echo
          echo "✓ IndexNow ping sent."
