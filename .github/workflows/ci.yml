name: CI

on:
  push:
    branches: [main, claude/development]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Repo lint
        run: npm run lint:repo

      - name: ESLint
        run: npm run lint:js

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # Deploy the built `dist/` to GitHub Pages on every push to main.
  #
  # ONE-TIME SETUP REQUIRED: in repo Settings → Pages → "Build and
  # deployment" → Source, choose **GitHub Actions**. Without that
  # this job runs but Pages keeps serving from the branch root —
  # path-based URLs (/learn/<topic> etc.) 404 because the per-topic
  # index.html files only exist after a build.
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint-and-build, e2e]
    runs-on: ubuntu-latest
    permissions:
      pages:    write
      id-token: write
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      # ────────────────────────────────────────────────────────────
      # Post-deploy smoke test. Hit the live URL and a representative
      # generated topic page; fail the workflow if either returns
      # anything other than 200. Without this, a partial Pages
      # rollout (artifact uploaded but not promoted, CDN cold, the
      # topic-routes plugin silently skipped, …) shows CI green
      # while the site is broken for real users.
      #
      # Pages can be slow to propagate after a deploy; we wait up to
      # ~90s in 6×15s tries before declaring a regression.
      # ────────────────────────────────────────────────────────────
      - name: Smoke-test the live site
        run: |
          set -euo pipefail
          BASE='https://econos.co.uk'
          PROBE_PATHS=( '/' '/learn/causes-of-inflation-and-deflation' '/sitemap.xml' )
          for path in "${PROBE_PATHS[@]}"; do
            url="${BASE}${path}"
            code=''
            for attempt in 1 2 3 4 5 6; do
              code=$(curl -fsSL -o /dev/null -w '%{http_code}' --retry 0 --max-time 15 "$url" || true)
              if [ "$code" = '200' ]; then
                echo "✓ $url (attempt $attempt)"
                break
              fi
              echo "… $url returned $code (attempt $attempt / 6) — waiting 15s for propagation"
              sleep 15
            done
            if [ "$code" != '200' ]; then
              echo "✗ $url did not return 200 after 90s — failing the deploy."
              exit 1
            fi
          done
