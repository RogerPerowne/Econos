<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Econos — Learn Cards</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f6fa;
      --surface: #ffffff;
      --border: #e8eaf0;
      --text: #1a1d2e;
      --muted: #7b8099;
      --green: #10b981;
      --blue: #2563eb;
      --amber: #f59e0b;
      --purple: #8b5cf6;
      --sidebar-w: 210px;
      --right-w: 280px;
      --header-h: 56px;
      --prog-h: 44px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── Sidebar ─── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      padding: 24px 0 0;
    }

    .logo { padding: 0 20px 6px; }
    .logo-dots { display: flex; gap: 4px; margin-bottom: 4px; }
    .logo-dots span { width: 7px; height: 7px; border-radius: 50%; }
    .logo-text { font-size: 22px; font-weight: 800; color: #2563eb; letter-spacing: -1px; }
    .logo-text .o1 { color: #10b981; }
    .logo-text .o2 { color: #f59e0b; }
    .logo-tag { font-size: 10px; color: var(--muted); margin-top: 2px; }

    .nav { margin-top: 20px; flex: 1; overflow-y: auto; padding: 0 10px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 12px;
      border-radius: 8px; font-size: 14px; color: var(--muted);
      cursor: pointer; font-weight: 500; text-decoration: none;
      transition: background 0.12s, color 0.12s;
    }
    .nav-item:hover { background: #f0f4ff; color: var(--text); }
    .nav-item.active { background: #eff4ff; color: #2563eb; font-weight: 600; }
    .nav-icon { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }

    .streak-card {
      margin: 12px; background: #fff7ed; border: 1px solid #fed7aa;
      border-radius: 12px; padding: 14px;
    }
    .streak-top {
      display: flex; align-items: center; gap: 6px;
      font-size: 14px; font-weight: 700; color: #ea580c; margin-bottom: 4px;
    }
    .streak-desc { font-size: 11px; color: #9a3412; line-height: 1.4; }

    .user-profile {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; border-top: 1px solid var(--border);
    }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #2563eb; color: #fff; font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .user-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .user-sub { font-size: 11px; color: var(--muted); }

    /* ─── Page wrapper ─── */
    .page-right {
      flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden;
    }

    /* ─── Header ─── */
    .header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 28px; flex-shrink: 0; z-index: 5;
    }
    .header-left {}
    .header-session { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #10b981; }
    .header-topic { font-size: 14px; font-weight: 700; color: var(--text); }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .streak-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 13px; font-weight: 600; color: #ea580c;
    }
    .header-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: #2563eb; color: #fff; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    /* ─── Progress bar ─── */
    .prog-bar-wrap {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 28px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .prog-label { font-size: 12px; font-weight: 600; color: var(--muted); white-space: nowrap; }
    .prog-track {
      flex: 1; height: 8px; background: #e5e7eb;
      border-radius: 4px; position: relative; overflow: visible;
    }
    .prog-fill {
      height: 100%; background: #10b981; border-radius: 4px;
      transition: width 0.4s ease; position: relative;
    }
    .prog-indicator {
      position: absolute; right: -6px; top: 50%;
      transform: translateY(-50%);
      width: 14px; height: 14px; border-radius: 50%;
      background: #10b981; border: 2px solid #fff;
      box-shadow: 0 0 0 2px #10b981;
    }
    .prog-pct { font-size: 12px; font-weight: 700; color: #10b981; white-space: nowrap; }
    .exit-btn {
      font-size: 12px; font-weight: 600; color: var(--muted);
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 12px; cursor: pointer; text-decoration: none;
      white-space: nowrap; transition: color 0.12s, border-color 0.12s;
    }
    .exit-btn:hover { color: var(--text); border-color: #9ca3af; }

    /* ─── Content area ─── */
    .content-area {
      flex: 1; display: flex; overflow: hidden;
    }

    .main {
      flex: 1; overflow-y: auto; padding: 32px 36px 60px; min-width: 0;
    }
    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ─── Card shell ─── */
    .learn-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 28px; box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }
    .learn-card-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 20px; margin-bottom: 24px;
    }
    .card-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: #10b981; margin-bottom: 10px;
    }
    .learn-card h2 {
      font-size: 22px; font-weight: 800; letter-spacing: -0.4px;
      color: var(--text); margin-bottom: 10px;
    }
    .learn-card .card-subtitle {
      font-size: 14px; color: var(--muted); line-height: 1.65;
    }

    /* Key takeaway box */
    .key-takeaway {
      background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 12px;
      padding: 16px; margin: 20px 0; display: flex; gap: 12px; align-items: flex-start;
    }
    .key-takeaway .kt-icon {
      width: 30px; height: 30px; border-radius: 8px; background: #d1fae5;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .key-takeaway-text { font-size: 14px; font-weight: 600; color: #065f46; line-height: 1.5; }

    /* Why it matters heading */
    .section-heading { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 14px; }

    /* Mini cards row */
    .mini-cards-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .mini-card {
      border: 1px solid var(--border); border-radius: 12px; padding: 16px;
      background: #fafbfd;
    }
    .mini-card-icon-wrap {
      width: 34px; height: 34px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center; margin-bottom: 10px;
    }
    .mini-card-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
    .mini-card-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

    /* Comparison panel */
    .compare-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 20px 0; }
    .compare-col {
      border-radius: 14px; padding: 20px;
    }
    .compare-col.green-side { background: #ecfdf5; border: 1px solid #a7f3d0; }
    .compare-col.blue-side { background: #eff6ff; border: 1px solid #bfdbfe; }

    .compare-col-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .compare-col-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .compare-col-title { font-size: 14px; font-weight: 700; }
    .compare-row-label { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
    .compare-row-text { font-size: 13px; line-height: 1.55; margin-bottom: 12px; }
    .compare-example {
      border-radius: 8px; padding: 12px;
      font-size: 12px; line-height: 1.55;
    }
    .compare-example.green-ex { background: #d1fae5; color: #065f46; }
    .compare-example.blue-ex { background: #dbeafe; color: #1e3a8a; }

    /* Think prompt */
    .think-box {
      background: #fffbeb; border: 1px solid #fde68a; border-radius: 12px;
      padding: 14px 18px; font-size: 13px; font-weight: 600; color: #78350f;
      margin-top: 16px;
    }

    /* Flow diagram */
    .flow-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 20px 0; }
    .flow-col { border-radius: 14px; padding: 20px; }
    .flow-col.green-flow { background: #ecfdf5; border: 1px solid #a7f3d0; }
    .flow-col.blue-flow { background: #eff6ff; border: 1px solid #bfdbfe; }

    .flow-col-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .flow-col-sub { font-size: 12px; margin-bottom: 16px; }

    .flow-steps { display: flex; flex-direction: column; gap: 0; }
    .flow-step { display: flex; gap: 12px; align-items: flex-start; }
    .flow-step-icon {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid; display: flex; align-items: center;
      justify-content: center; font-size: 14px; flex-shrink: 0;
    }
    .flow-connector {
      width: 2px; height: 20px; margin-left: 17px; margin-top: 2px; margin-bottom: 2px;
    }
    .flow-step-body { padding-top: 6px; padding-bottom: 8px; }
    .flow-step-num { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
    .flow-step-text { font-size: 12px; line-height: 1.5; }

    .flow-example { border-radius: 8px; padding: 12px; font-size: 12px; line-height: 1.55; margin-top: 12px; }
    .flow-example.green-ex { background: #d1fae5; color: #065f46; }
    .flow-example.blue-ex { background: #dbeafe; color: #1e3a8a; }

    /* Exam tip / key link boxes */
    .tip-box {
      border-radius: 12px; padding: 16px; margin-top: 16px;
      display: flex; gap: 12px; align-items: flex-start;
    }
    .tip-box.purple-tip { background: #f5f3ff; border: 1px solid #ddd6fe; }
    .tip-box.blue-tip { background: #eff6ff; border: 1px solid #bfdbfe; }
    .tip-box.amber-tip { background: #fffbeb; border: 1px solid #fde68a; }
    .tip-box.green-tip { background: #ecfdf5; border: 1px solid #a7f3d0; }

    .tip-icon {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .tip-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .tip-text { font-size: 13px; line-height: 1.55; }

    /* Effects row */
    .effects-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 20px 0; }
    .effect-card { border-radius: 14px; padding: 18px; }
    .effect-card.green-eff { background: #ecfdf5; border: 1px solid #a7f3d0; }
    .effect-card.blue-eff { background: #eff6ff; border: 1px solid #bfdbfe; }
    .effect-card.purple-eff { background: #f5f3ff; border: 1px solid #ddd6fe; }

    .effect-icon-wrap {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; margin-bottom: 10px;
    }
    .effect-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .effect-desc { font-size: 13px; line-height: 1.55; }

    /* Summary card */
    .summary-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #ecfdf5; border: 1px solid #a7f3d0;
      color: #059669; font-size: 13px; font-weight: 700;
      padding: 6px 14px; border-radius: 20px; margin-bottom: 20px;
    }

    .summary-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    .summary-table tr { border-bottom: 1px solid var(--border); }
    .summary-table tr:last-child { border-bottom: none; }
    .summary-table td { padding: 14px 16px; font-size: 14px; }
    .summary-table td:first-child {
      font-weight: 700; color: var(--text); width: 140px;
      border-right: 1px solid var(--border);
    }
    .summary-table td:last-child { color: #374151; }

    .whats-next-card {
      background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px;
      padding: 18px; margin-bottom: 20px;
    }
    .whats-next-title { font-size: 14px; font-weight: 700; color: #1e40af; margin-bottom: 6px; }
    .whats-next-text { font-size: 13px; color: #1e40af; line-height: 1.6; }

    .btn-complete {
      display: block; width: 100%; max-width: 440px;
      padding: 14px; background: #10b981; color: #fff;
      font-size: 15px; font-weight: 700; border: none; border-radius: 12px;
      cursor: pointer; text-align: center; text-decoration: none;
      transition: background 0.15s;
    }
    .btn-complete:hover { background: #059669; }

    /* Nav buttons */
    .card-nav {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-top: 4px;
    }
    .btn-nav {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 10px;
      font-size: 14px; font-weight: 600; border: none; cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-prev {
      background: var(--surface); border: 1.5px solid var(--border); color: var(--text);
    }
    .btn-prev:hover:not(:disabled) { background: #f0f4ff; }
    .btn-prev:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-next {
      background: #2563eb; color: #fff; margin-left: auto;
    }
    .btn-next:hover { background: #1d4ed8; }

    /* ─── Right panel ─── */
    .right-panel {
      width: var(--right-w); background: var(--surface);
      border-left: 1px solid var(--border);
      flex-shrink: 0; padding: 24px 20px;
      overflow-y: auto; display: flex; flex-direction: column; gap: 24px;
    }
    .right-panel::-webkit-scrollbar { width: 4px; }
    .right-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .rp-section-title {
      font-size: 13px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted); margin-bottom: 14px;
    }

    /* Progress dots */
    .dots-row {
      display: flex; align-items: center; gap: 0; margin-bottom: 6px;
    }
    .dot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
      border: 2px solid;
    }
    .dot.filled { background: #10b981; border-color: #10b981; color: #fff; }
    .dot.check { background: #10b981; border-color: #10b981; color: #fff; }
    .dot.outline { background: #fff; border-color: #d1d5db; color: #9ca3af; }
    .dot-connector { flex: 1; height: 2px; background: #e5e7eb; margin: 0 2px; }
    .dot-connector.filled-line { background: #10b981; }

    .prog-sub { font-size: 11px; color: var(--muted); margin-bottom: 16px; }

    /* Cards list */
    .cards-list { display: flex; flex-direction: column; gap: 2px; }
    .card-list-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 10px; border-radius: 10px;
      font-size: 13px; cursor: pointer;
      transition: background 0.12s;
    }
    .card-list-item:hover { background: #f5f6fa; }
    .card-list-item.current { background: #ecfdf5; }
    .card-num {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .card-num.current-num { background: #10b981; color: #fff; }
    .card-num.done-num { background: #ecfdf5; color: #10b981; border: 1.5px solid #10b981; }
    .card-num.future-num { background: #f3f4f6; color: #9ca3af; }
    .card-list-name { flex: 1; font-weight: 500; }
    .card-list-name.current-name { font-weight: 700; color: #059669; }
    .card-list-name.future-name { color: #9ca3af; }
    .current-pill {
      font-size: 10px; font-weight: 600; color: #059669;
      background: #d1fae5; padding: 2px 7px; border-radius: 20px;
    }
    .done-check {
      width: 20px; height: 20px; border-radius: 50%;
      background: #10b981; display: flex; align-items: center; justify-content: center;
    }

    /* Sidebar tip boxes */
    .sidebar-tip {
      border-radius: 12px; padding: 14px;
    }
    .sidebar-tip.amber-s { background: #fffbeb; border: 1px solid #fde68a; }
    .sidebar-tip.blue-s { background: #eff6ff; border: 1px solid #bfdbfe; }
    .sidebar-tip.green-s { background: #ecfdf5; border: 1px solid #a7f3d0; }
    .sidebar-tip.purple-s { background: #f5f3ff; border: 1px solid #ddd6fe; }
    .sidebar-tip-title { font-size: 12px; font-weight: 700; margin-bottom: 5px; }
    .sidebar-tip-text { font-size: 12px; line-height: 1.55; }
  </style>
</head>

let currentCard = 1;
const TOTAL = CARDS.length;

// ─── Render ───────────────────────────────────────────────────────────────────

function renderCard() {
  const card = CARDS[currentCard - 1];
  const pct = Math.round((currentCard / TOTAL) * 100);

  // Progress bar
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';

  // Main content
  const prevDisabled = currentCard === 1 ? 'disabled' : '';
  const isLast = currentCard === TOTAL;

  document.getElementById('main-content').innerHTML = `
    ${card.render()}
    <div class="card-nav">
      <button class="btn-nav btn-prev" id="btn-prev" ${prevDisabled} onclick="navigate(-1)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Previous
      </button>
      ${!isLast ? `
      <button class="btn-nav btn-next" id="btn-next" onclick="navigate(1)">
        Next card
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>` : ''}
    </div>
  `;

  // Right panel
  renderRightPanel(card, pct);
}

function renderRightPanel(card, pct) {
  // Dots for session progress (3 dots = 3 phases)
  const dotPhase = currentCard <= 1 ? 0 : currentCard <= 3 ? 1 : 2;

  function dot(i) {
    if (i < dotPhase) return `<div class="dot check"><svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="2 6 5 9 10 3"/></svg></div>`;
    if (i === dotPhase) return `<div class="dot filled">${i + 1}</div>`;
    return `<div class="dot outline">${i + 1}</div>`;
  }

  function connector(i) {
    const filled = i < dotPhase;
    return `<div class="dot-connector${filled ? ' filled-line' : ''}"></div>`;
  }

  // Cards list
  let cardsHtml = '';
  CARDS.forEach(c => {
    const done = c.id < currentCard;
    const curr = c.id === currentCard;
    const future = c.id > currentCard;

    const titles = ['What is inflation?', 'Types of inflation', 'How inflation happens', 'Effects of inflation', 'Summary'];
    const name = titles[c.id - 1];

    if (curr) {
      cardsHtml += `
        <div class="card-list-item current">
          <div class="card-num current-num">${c.id}</div>
          <div class="card-list-name current-name">${name}</div>
          <span class="current-pill">Current</span>
        </div>`;
    } else if (done) {
      cardsHtml += `
        <div class="card-list-item" onclick="goToCard(${c.id})">
          <div class="card-num done-num">${c.id}</div>
          <div class="card-list-name">${name}</div>
          <div class="done-check"><svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="2 6 5 9 10 3"/></svg></div>
        </div>`;
    } else {
      cardsHtml += `
        <div class="card-list-item">
          <div class="card-num future-num">${c.id}</div>
          <div class="card-list-name future-name">${name}</div>
        </div>`;
    }
  });

  document.getElementById('right-panel').innerHTML = `
    <div>
      <div class="rp-section-title">Session progress</div>
      <div class="dots-row">
        ${dot(0)}${connector(0)}${dot(1)}${connector(1)}${dot(2)}
      </div>
      <div class="prog-sub">Step 1 of 3: Core understanding</div>
    </div>
    <div>
      <div class="rp-section-title">Cards</div>
      <div class="cards-list">${cardsHtml}</div>
    </div>
    <div>
      <div class="sidebar-tip ${card.sidebarTip.cls}">
        <div class="sidebar-tip-title" style="color:inherit;">${card.sidebarTip.title}</div>
        <div class="sidebar-tip-text">${card.sidebarTip.text}</div>
      </div>
    </div>
  `;
}

function navigate(dir) {
  const next = currentCard + dir;
  if (next >= 1 && next <= TOTAL) {
    currentCard = next;
    renderCard();
    document.getElementById('main-content').scrollTop = 0;
  }
}

function goToCard(id) {
  currentCard = id;
  renderCard();
}
