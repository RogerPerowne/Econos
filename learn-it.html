<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Learn It – Econos topic page.">
  <meta name="theme-color" content="#FAF8F4">
  <title>Learn It · Econos</title>

  <!-- Fonts: preconnect + non-blocking download -->

  <!-- Icons and favicons -->
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Econos" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Stylesheet (canonical – root of project, user-customised) -->
  <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-variable.woff2" crossorigin>
  <link rel="stylesheet" href="/fonts.css">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/css/econ-tokens.css">
  <link rel="stylesheet" href="/css/econ-blocks.css">

  <!-- Preload the big shared scripts so the network grabs them in parallel
       while HTML parses. `defer` keeps execution ordered. -->
  <!-- Auth gate runs first; everything else is deferred so it doesn't block paint -->
  <script src="/js/auth-check.js"></script>
  <script defer src="/js/logger.js"></script>
  <script defer src="/js/icons.js"></script>
  <script defer src="/js/render-blocks.js"></script>
  <script defer src="/js/pdf.js"></script>
  <script defer src="/js/elasticity-explorer.js"></script>
  <script defer src="/js/pes-explorer.js"></script>
  <script defer src="/js/yed-xed-explorer.js"></script>
  <script defer src="/js/topics.js"></script>
  <script defer src="/js/config/boards.js"></script>
  <script defer src="/js/config/stations.js"></script>
  <script defer src="/js/topic-loader.js"></script>
  <script defer src="/js/progress.js"></script>
  <script defer src="/js/engines/shell.js"></script>
  <script defer src="/js/engines/quiz-engine.js"></script>
  <script defer src="/js/boot/learn-it-boot.js"></script>
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Econos">
  <meta property="og:url" content="https://econos.co.uk/learn">
  <meta property="og:title" content="Learn It · Econos">
  <meta property="og:description" content="Bite-sized A-Level economics concept cards. Learn it. Link it. Land it.">
  <meta property="og:image" content="https://econos.co.uk/assets/logo-full.png">
  <link rel="canonical" href="https://econos.co.uk/learn">
  <script defer src="/js/sw-register.js"></script>
</head>
<body>

  <!-- Initial-load skeleton — the engine renders into #app-root once
       topic data + app.js have loaded and replaces the whole block.
       This means slow networks see the right chrome shape immediately
       instead of a blank cream page for half a second. -->
  <div id="app-root">
    <div class="app" aria-busy="true">
      <div class="skeleton skeleton--sidebar"></div>
      <div class="skeleton__main">
        <div class="skeleton skeleton--topbar"></div>
        <div class="skeleton__page">
          <div class="skeleton skeleton--card"></div>
          <div class="skeleton skeleton--card"></div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
