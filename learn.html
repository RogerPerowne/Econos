<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Learn It — econos topic page.">
  <meta name="theme-color" content="#FAF8F4">
  <title>Learn It · econos</title>

  <!-- Fonts: preconnect + non-blocking download -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,400..700,0..100,0..1&family=Inter:wght@400;500;600;700;800&display=swap" onload="this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,400..700,0..100,0..1&family=Inter:wght@400;500;600;700;800&display=swap"></noscript>

  <!-- Icons and favicons -->
  <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="econos" />
  <link rel="manifest" href="site.webmanifest" />

  <!-- Stylesheet (canonical — root of project, user-customised) -->
  <link rel="stylesheet" href="styles.css">

  <!-- Preload the big shared scripts so the network grabs them in parallel
       while HTML parses. `defer` keeps execution ordered. -->
  <link rel="preload" as="script" href="js/icons.js">
  <link rel="preload" as="script" href="js/app.js">

  <!-- Auth gate runs first; everything else is deferred so it doesn't block paint -->
  <script src="js/auth-check.js"></script>
  <script defer src="js/icons.js"></script>
  <script defer src="js/pdf.js"></script>
  <script defer src="js/elasticity-explorer.js"></script>
  <script defer src="js/pes-explorer.js"></script>
  <script defer src="js/yed-xed-explorer.js"></script>
  <script defer src="js/topic-loader.js"></script>
  <script defer src="js/engines/shell.js"></script>
  <script>
    /* Once deferred scripts have run (DOMContentLoaded), pull the topic
       data file then load app.js — app.js is an IIFE that reads
       window.ECONOS_TOPIC and renders into #app-root. */
    document.addEventListener('DOMContentLoaded', function () {
      TopicLoader.loadDataThenScript('data-topic.js', 'js/app.js', 'Learn It');
    });
  </script>
</head>
<body>

  <nav class="mobile-nav">
    <a href="index.html" class="mobile-nav__logo"><img src="assets/econos-icon.png" alt="econos"></a>
    <div class="mobile-nav__right">
      <span class="mobile-nav__streak"><span>🔥</span><span>1</span></span>
      <div class="mobile-nav__avatar">AB</div>
    </div>
  </nav>

  <div id="app-root"></div>

</body>
</html>
