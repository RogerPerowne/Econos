<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>econos · Sign in</title>
  <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="econos" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="preload" as="font" type="font/woff2" href="fonts/inter-variable.woff2" crossorigin>
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="card">
    <img src="assets/econos-logo-full.png" alt="econos" class="logo">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to access the demo</p>
    <form id="login-form" autocomplete="off">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Username" autocomplete="username">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Password" autocomplete="current-password">
      <button type="submit" class="btn">Sign in</button>
    </form>
    <div class="error" id="error-msg"></div>
    <p class="footer-note">A-Level Economics &mdash; Demo access only</p>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var u = document.getElementById('username').value.trim();
      var p = document.getElementById('password').value;
      if (u === 'econos' && p === 'demo2024') {
        localStorage.setItem('econosAuth', '1');
        window.location.href = 'index.html';
      } else {
        document.getElementById('error-msg').textContent = 'Incorrect username or password.';
      }
    });
  </script>
</body>
</html>
