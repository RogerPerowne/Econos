<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'">
  <title>Offline · Econos</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon-96x96.png" sizes="96x96" type="image/png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="fonts.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #FAF8F4;
      color: #0B1426;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border: 1px solid #E7E7EA;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo { height: 40px; margin-bottom: 32px; }
    .wifi-icon {
      font-size: 64px;
      line-height: 1;
      margin-bottom: 20px;
      display: block;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #0B1426;
      margin-bottom: 12px;
    }
    .sub {
      font-size: 15px;
      color: #6B7280;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      background: #059669;
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <img src="assets/logo-full.png" alt="Econos" class="logo">
    <span class="wifi-icon">📶</span>
    <h1>You're offline</h1>
    <p class="sub">Check your connection and try again. Your previously visited pages may still be available.</p>
    <button class="btn" onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
