<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="econos topic quiz.">
  <title>Quiz · econos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,400..700,0..100,0..1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
  <script src="js/auth-check.js"></script>
</head>
<body>

  <nav class="mobile-nav">
    <a href="index.html" class="mobile-nav__logo"><img src="assets/econos-icon.png" alt="econos"></a>
    <div class="mobile-nav__right">
      <span class="mobile-nav__streak"><span>🔥</span><span>1</span></span>
      <div class="mobile-nav__avatar">AB</div>
    </div>
  </nav>
  <div id="app-root"></div>

  <script src="js/icons.js"></script>
  <script src="js/topic-loader.js"></script>
  <script src="js/engines/quiz-engine.js"></script>

  <script>
  (function () {
    var quizId = (new URLSearchParams(window.location.search)).get('quiz') || 'causes';
    var dataFile = 'data-quiz-' + quizId + '.js';
    TopicLoader.loadData(['data-topic.js', dataFile], function () { run(); }, 'this quiz');

    function run() {
      var I = window.ECONOS_ICONS;
      var Q = window.ECONOS_QUIZ;
      var T = window.ECONOS_TOPIC;
      var SHORT_NAMES = Q.shortNames || {};
      var topicHref = TopicLoader.buildUrl('topic.html');

      var navItems = [
        { name: 'Home',         icon: I.home,     href: 'index.html', active: false },
        { name: 'My topics',    icon: I.topics,   href: '#',          active: true  },
        { name: 'Progress',     icon: I.progress, href: '#',          active: false },
        { name: 'Exam practice',icon: I.practice, href: '#',          active: false },
        { name: 'Study planner',icon: I.planner,  href: '#',          active: false },
        { name: 'Messages',     icon: I.messages, href: '#',          active: false },
        { name: 'Settings',     icon: I.settings, href: '#',          active: false }
      ];

      var sidebar = ''
        + '<aside class="sidebar">'
        +   '<div class="sidebar__brand">'
        +     '<div class="sidebar__logo"><img src="assets/econos-icon.png" alt="econos"></div>'
        +     '<div class="sidebar__wordmark">econos</div>'
        +     '<div class="sidebar__tagline">'
        +       'Learn it<span class="ec-stop-green">.</span> Link it<span class="ec-stop-yellow">.</span> Land it<span class="ec-stop-pink">.</span>'
        +     '</div>'
        +   '</div>'
        +   '<nav class="sidebar__nav">'
        +     navItems.map(function (n) {
                return '<a href="' + n.href + '" class="' + (n.active ? 'is-active' : '') + '">' + n.icon + '<span>' + n.name + '</span></a>';
              }).join('')
        +   '</nav>'
        +   '<div class="sidebar__streak">'
        +     '<div class="sidebar__streak-row"><span class="sidebar__streak-flame">🔥</span><span class="sidebar__streak-num">1</span></div>'
        +     '<div class="sidebar__streak-label">Day streak</div>'
        +     '<div class="sidebar__streak-sub">Keep it going!</div>'
        +   '</div>'
        +   '<div class="sidebar__user">'
        +     '<div class="sidebar__user-avatar">AB</div>'
        +     '<div class="sidebar__user-info">'
        +       '<div class="sidebar__user-name">Alex Brown</div>'
        +       '<div class="sidebar__user-role">A-Level Economics</div>'
        +     '</div>'
        +     '<div class="sidebar__user-chev">' + I.chevDown + '</div>'
        +   '</div>'
        + '</aside>';

      var topbar = ''
        + '<header class="topbar">'
        +   '<a href="' + topicHref + '" class="topbar__back">' + I.arrowLeft + '</a>'
        +   '<div class="topbar__crumbs">'
        +     '<div class="topbar__session-label">' + Q.sessionLabel + '</div>'
        +     '<div class="topbar__topic-title">' + Q.title + '</div>'
        +   '</div>'
        +   '<div class="topbar__right">'
        +     '<div class="topbar__streak"><span class="topbar__streak-icon">🔥</span><span>1 day streak</span></div>'
        +     '<div class="topbar__avatar"><div class="topbar__avatar-circle">AB</div><span class="topbar__avatar-chev">' + I.chevDown + '</span></div>'
        +   '</div>'
        + '</header>';

      var cardsList = T.cards.map(function (c, i) {
        var name = SHORT_NAMES[c.id] || c.id;
        return ''
          + '<a href="' + topicHref + '" class="cards-list__item is-done" data-card-idx="' + i + '">'
          +   '<div class="cards-list__num">' + I.check + '</div>'
          +   '<div class="cards-list__body"><div class="cards-list__name">' + name + '</div></div>'
          + '</a>';
      }).join('')
      + '<div class="cards-list__item is-current">'
      +   '<div class="cards-list__num">★</div>'
      +   '<div class="cards-list__body"><div class="cards-list__name">Quiz</div><span class="cards-list__chip">Current</span></div>'
      + '</div>';

      var sessionDots = ''
        + '<div class="session-dots">'
        +   '<div class="session-dot is-current">1</div>'
        +   '<div class="session-line"></div>'
        +   '<div class="session-dot">2</div>'
        +   '<div class="session-line"></div>'
        +   '<div class="session-dot">3</div>'
        + '</div>';

      var rail = ''
        + '<aside class="right-rail">'
        +   '<div class="rail-card">'
        +     '<div class="rail-card__title">Topic progress</div>'
        +     '<div class="rail-card__sub">Step 1 of 3: Learn</div>'
        +     sessionDots
        +   '</div>'
        +   '<div class="rail-card">'
        +     '<div class="rail-card__title" style="margin-bottom: var(--sp-3);">Cards</div>'
        +     '<div class="cards-list">' + cardsList + '</div>'
        +   '</div>'
        +   '<div class="deck-download">'
        +     '<div class="deck-download__head">'
        +       '<div class="deck-download__icon">📄</div>'
        +       '<div>'
        +         '<div class="deck-download__title">Want more depth?</div>'
        +         '<div class="deck-download__sub">Download the full topic deck</div>'
        +       '</div>'
        +     '</div>'
        +     '<button class="deck-download__btn">📥 Download PDF</button>'
        +   '</div>'
        + '</aside>';

      var intro = ''
        + '<div id="quiz-root">'
        +   '<div class="quiz-hero">'
        +     '<div class="quiz-hero__eyebrow">Test yourself</div>'
        +     '<div class="quiz-hero__title">' + Q.title + '</div>'
        +     '<p class="quiz-hero__lede">' + (Q.lede || 'Exam-style questions across mixed formats — designed for the analysis and evaluation marks examiners reward.') + '</p>'
        +     '<div class="quiz-hero__meta">'
        +       '<div class="quiz-hero__meta-item"><span class="quiz-hero__meta-label">Questions</span><span class="quiz-hero__meta-value">' + Q.questions.length + '</span></div>'
        +       '<div class="quiz-hero__meta-item"><span class="quiz-hero__meta-label">Approx. time</span><span class="quiz-hero__meta-value">15–20 min</span></div>'
        +       '<div class="quiz-hero__meta-item"><span class="quiz-hero__meta-label">Formats</span><span class="quiz-hero__meta-value">10</span></div>'
        +     '</div>'
        +     '<button class="quiz-start-btn" id="quiz-start">Start the quiz →</button>'
        +   '</div>'
        + '</div>';

      var page = '<div class="page">' + intro + rail + '</div>';

      document.getElementById('app-root').innerHTML =
        '<div class="app">' + sidebar + '<div class="main">' + topbar + page + '</div></div>';

      document.getElementById('quiz-start').addEventListener('click', function () {
        window.bootQuiz(Q.questions, {
          title:        Q.title,
          subtitle:     Q.subtitle,
          backUrl:      Q.backUrl || topicHref,
          backLabel:    Q.backLabel,
          sessionLabel: Q.sessionLabel
        });
      });
    }
  })();
  </script>

</body>
</html>
