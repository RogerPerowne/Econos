<!DOCTYPE html>
<!--
  Generic quiz shell.

  Path-based URL: `/quiz/<topic>/<set>`. Loads
  `js/data/<topic>/quiz-<set>.js` via the quiz engine. Today every
  link passes `quiz=main` (the topic-level "Test yourself" CTA), but
  the URL shape is intentionally generic so future quiz types
  (past-paper practice, adaptive weakness-targeted, daily mixed-topic
  warm-ups, predicted-paper mocks) can ship under the same route by
  adding a new data file – no new HTML, no engine changes.

  This is the canonical quiz route. Link It and Land It also host
  *stage-specific* quizzes inline at `/link/<topic>/quiz` and
  `/land/<topic>/quiz` (tightly coupled to the work just done in
  those sections) — see js/engines/link-router.js + land-router.js.
  quiz.html stays
  separate for the cross-section / standalone use cases.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Econos quiz.">
  <title>Quiz · Econos</title>

  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Econos" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-variable.woff2" crossorigin>
  <link rel="stylesheet" href="/fonts.css">
  <link rel="stylesheet" href="/styles.css">
  <script src="/js/auth-check.js"></script>
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Econos">
  <meta property="og:url" content="https://econos.co.uk/quiz">
  <meta property="og:title" content="Quiz · Econos">
  <meta property="og:description" content="Test your economics knowledge. A-Level revision quizzes — Econos.">
  <meta property="og:image" content="https://econos.co.uk/assets/logo-full.png">
  <link rel="canonical" href="https://econos.co.uk/quiz">
  <script defer src="/js/sw-register.js"></script>
  <script defer src="/js/logger.js"></script>
  <script defer src="/js/icons.js"></script>
  <script defer src="/js/config/boards.js"></script>
  <script defer src="/js/topic-loader.js"></script>
  <script defer src="/js/progress.js"></script>
  <script defer src="/js/engines/shell.js"></script>
  <script defer src="/js/engines/quiz-engine.js"></script>
  <script defer src="/js/boot/quiz-boot.js"></script>
</head>
<body>

  <!-- Initial-load skeleton — replaced by the quiz boot script. -->
  <div id="app-root">
    <div class="app" aria-busy="true">
      <div class="skeleton skeleton--sidebar"></div>
      <div class="skeleton__main">
        <div class="skeleton skeleton--topbar"></div>
        <div class="skeleton__page">
          <div class="skeleton skeleton--card"></div>
          <div class="skeleton skeleton--card"></div>
        </div>
      </div>
    </div>
  </div>


</body>
</html>
