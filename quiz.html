<!DOCTYPE html>
<!--
  Generic quiz shell.

  Accepts `?topic=<id>&quiz=<set>` and loads
  `js/data/<id>/data-quiz-<set>.js` via the quiz engine. Today every
  link passes `quiz=main` (the topic-level "Test yourself" CTA), but
  the URL shape is intentionally generic so future quiz types
  (past-paper practice, adaptive weakness-targeted, daily mixed-topic
  warm-ups, predicted-paper mocks) can ship under the same route by
  adding a new data file – no new HTML, no engine changes.

  This is the canonical quiz route. Link It and Land It also host
  *stage-specific* quizzes inline as `?station=quiz` (because those
  are tightly coupled to the work just done in those sections) –
  see js/engines/link-router.js + land-router.js. quiz.html stays
  separate for the cross-section / standalone use cases.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Econos quiz.">
  <title>Quiz · Econos</title>

  <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Econos" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="preload" as="font" type="font/woff2" href="fonts/inter-variable.woff2" crossorigin>
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="styles.css">
  <script src="js/auth-check.js"></script>
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Econos">
  <meta property="og:url" content="https://econos.co.uk/quiz">
  <meta property="og:title" content="Quiz · Econos">
  <meta property="og:description" content="Test your economics knowledge. A-Level revision quizzes — Econos.">
  <meta property="og:image" content="https://econos.co.uk/assets/logo-full.png">
  <link rel="canonical" href="https://econos.co.uk/quiz">
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</head>
<body>

  <!-- mobile-nav is auto-injected by js/engines/shell.js -->
  <div id="app-root"></div>

  <script src="js/logger.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/topic-loader.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/engines/shell.js"></script>
  <script src="js/engines/quiz-engine.js"></script>

  <script>
  (function () {
    var quizId = (new URLSearchParams(window.location.search)).get('quiz') || 'causes';
    var dataFile = 'data-quiz-' + quizId + '.js';
    TopicLoader.loadData(['data-topic.js', dataFile], function () { run(); }, 'this quiz');

    function run() {
      var I = window.ECONOS_ICONS;
      var Q = window.ECONOS_QUIZ;
      var T = window.ECONOS_TOPIC;
      var SHORT_NAMES = Q.shortNames || {};
      var topicHref = TopicLoader.buildUrl('learn.html');

      var sidebar = Shell.renderSidebar({ activeNav: 'My topics' });
      var topbar  = Shell.renderTopbar({
        backUrl:      topicHref,
        backLabel:    'Topics',
        sessionLabel: Q.sessionLabel,
        topicTitle:   Q.title
      });

      var cardsList = T.cards.map(function (c, i) {
        var name = c.title || SHORT_NAMES[c.id] || c.id;
        return ''
          + '<a href="' + topicHref + '" class="cards-list__item is-done" data-card-idx="' + i + '">'
          +   '<div class="cards-list__num">' + I.check + '</div>'
          +   '<div class="cards-list__body"><div class="cards-list__name">' + name + '</div></div>'
          + '</a>';
      }).join('')
      + '<div class="cards-list__item is-current">'
      +   '<div class="cards-list__num">★</div>'
      +   '<div class="cards-list__body"><div class="cards-list__name">Quiz</div><span class="cards-list__chip">Current</span></div>'
      + '</div>';

      var sessionDots = ''
        + '<div class="session-dots">'
        +   '<div class="session-dot is-current">1</div>'
        +   '<div class="session-line"></div>'
        +   '<div class="session-dot">2</div>'
        +   '<div class="session-line"></div>'
        +   '<div class="session-dot">3</div>'
        + '</div>';

      var rail = ''
        + '<div class="right-rail">'
        +   Shell.renderStages()
        +   '<div class="rail-card">'
        +     '<div class="rail-card__title">Topic progress</div>'
        +     '<div class="rail-card__sub">Step 1 of 3: Learn</div>'
        +     sessionDots
        +   '</div>'
        +   '<div class="rail-card">'
        +     '<div class="rail-card__title" style="margin-bottom: var(--sp-3);">Cards</div>'
        +     '<div class="cards-list">' + cardsList + '</div>'
        +   '</div>'
        +   '<div class="deck-download">'
        +     '<div class="deck-download__head">'
        +       '<div class="deck-download__icon">📄</div>'
        +       '<div>'
        +         '<div class="deck-download__title">Want more depth?</div>'
        +         '<div class="deck-download__sub">Download the full topic deck</div>'
        +       '</div>'
        +     '</div>'
        +     '<button class="deck-download__btn">📥 Download PDF</button>'
        +   '</div>'
        + '</div>';

      var intro = ''
        + '<div id="quiz-root">'
        +   '<div class="quiz-hero">'
        +     '<div class="quiz-hero__eyebrow">Test yourself</div>'
        +     '<div class="quiz-hero__title">' + Q.title + '</div>'
        +     '<p class="quiz-hero__lede">' + (Q.lede || 'Exam-style questions across mixed formats – designed for the analysis and evaluation marks examiners reward.') + '</p>'
        +     '<div class="quiz-hero__meta">'
        +       '<div class="quiz-hero__meta-item"><span class="quiz-hero__meta-label">Questions</span><span class="quiz-hero__meta-value">' + Q.questions.length + '</span></div>'
        +       '<div class="quiz-hero__meta-item"><span class="quiz-hero__meta-label">Approx. time</span><span class="quiz-hero__meta-value">15–20 min</span></div>'
        +       '<div class="quiz-hero__meta-item"><span class="quiz-hero__meta-label">Formats</span><span class="quiz-hero__meta-value">10</span></div>'
        +     '</div>'
        +     '<button class="quiz-start-btn" id="quiz-start">Start the quiz →</button>'
        +   '</div>'
        + '</div>';

      var page = '<div class="page">' + intro + rail + '</div>';

      document.getElementById('app-root').innerHTML =
        '<div class="app">' + sidebar + '<div id="main-content" class="main" tabindex="-1" role="main">' + topbar + page + '</div></div>';

      document.getElementById('quiz-start').addEventListener('click', function () {
        window.bootQuiz(Q.questions, {
          title:        Q.title,
          subtitle:     Q.subtitle,
          backUrl:      Q.backUrl || topicHref,
          backLabel:    Q.backLabel,
          sessionLabel: Q.sessionLabel
        });
      });
    }
  })();
  </script>

</body>
</html>
